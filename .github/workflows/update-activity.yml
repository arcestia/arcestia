name: 🔄 Update Recent Activity

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch: # Allows manual triggering
  push:
    paths:
      - "scripts/update_activity.py"

jobs:
  update-activity:
    name: Update Recent Activity in README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run update script
        run: python scripts/update_activity.py
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GH_TOKEN }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "160487326+Skiddle-Git@users.noreply.github.com"
          git config --local user.name "Skiddle-Git"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update recent GitHub activity" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
