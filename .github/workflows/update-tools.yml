name: 🛠️ Update Tools Section

on:
  push:
    paths:
      - ".github/config/tools.json"
      - "scripts/update_tools.py"
  workflow_dispatch: # Manual trigger

jobs:
  update-tools:
    name: Update Tools in README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run update script
        run: python scripts/update_tools.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "160487326+Skiddle-Git@users.noreply.github.com"
          git config --local user.name "Skiddle-Git"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🛠️ Update tools section from config" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
