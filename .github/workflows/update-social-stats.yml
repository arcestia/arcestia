name: 📊 Update Social Statistics

on:
  push:
    paths:
      - ".github/config/social.json"
      - "scripts/update_social_stats.py"
  workflow_dispatch: # Manual dispatch
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours to check for cache expiration

jobs:
  update-stats:
    name: Update Social Stats in README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run update script
        run: python scripts/update_social_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "160487326+Skiddle-Git@users.noreply.github.com"
          git config --local user.name "Skiddle-Git"
          git add README.md .github/config/stats_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Updates social media follower statistics and cache" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
